{% extends 'core/base.html' %}

{% block title %}404 - Page Not Found | {{ site_config.site_name }}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="text-center px-4">
        <div class="text-8xl font-bold text-gray-300 mb-4">404</div>
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">Page Not Found</h1>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">
            Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
        </p>
        <a href="{% url 'home' %}" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
            Go Back Home
        </a>
    </div>
</section>
{% endblock %}
