{% extends 'dashboard/base.html' %}

{% block dashboard_content %}
<section class="max-w-2xl rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-red-500">Delete</p>
    <h3 class="mt-3 text-2xl font-extrabold text-slate-950">{{ section_label }}</h3>
    <p class="mt-3 text-sm text-slate-600">
        You are about to permanently delete <span class="font-bold text-slate-950">{{ object_name }}</span>.
        This action cannot be undone.
    </p>

    <form method="post" class="mt-8 flex flex-wrap gap-3">
        {% csrf_token %}
        <button type="submit" class="inline-flex items-center rounded-2xl bg-red-600 px-6 py-3 text-sm font-bold text-white transition hover:bg-red-700">
            Yes, Delete
        </button>
        <a href="{{ back_url }}" class="inline-flex items-center rounded-2xl border border-slate-200 px-6 py-3 text-sm font-bold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50">
            Cancel
        </a>
    </form>
</section>
{% endblock %}
