<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Email Sent | {{ site_config.site_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
    <div class="grid min-h-screen lg:grid-cols-2">
        <div class="relative hidden overflow-hidden lg:block">
            <div class="absolute inset-0 bg-gradient-to-br from-blue-500 via-cyan-400 to-emerald-400 opacity-80"></div>
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(255,255,255,0.35),_transparent_35%),radial-gradient(circle_at_bottom_right,_rgba(15,23,42,0.4),_transparent_30%)]"></div>
            <div class="relative flex h-full flex-col justify-between p-12">
                <div>
                    <p class="text-sm uppercase tracking-[0.4em] text-white/70">Admin Panel</p>
                    <h1 class="mt-6 max-w-md text-5xl font-extrabold leading-tight text-slate-950">
                        Check your email for the reset link.
                    </h1>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-center px-6 py-12">
            <div class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-900 p-8 shadow-2xl shadow-black/30 text-center">
                <div class="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                
                <h2 class="text-2xl font-extrabold">Email Sent!</h2>
                <p class="mt-4 text-slate-400">
                    We've sent password reset instructions to your email address. Please check your inbox and follow the link to reset your password.
                </p>
                
                <div class="mt-8 p-4 rounded-2xl bg-slate-800/50 border border-slate-700">
                    <p class="text-sm text-slate-400">
                        Didn't receive the email? Check your spam folder or
                        <a href="{% url 'password_reset' %}" class="text-blue-400 hover:text-blue-300">try again</a>.
                    </p>
                </div>

                <div class="mt-8">
                    <a href="{% url 'dashboard_login' %}" class="inline-flex items-center text-sm font-semibold text-slate-300 transition hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
